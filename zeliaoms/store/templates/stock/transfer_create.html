{% extends "partials/base.html" %}
{% load static %}

{% block title %}Create Transfer - Zelia{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h4 class="fw-bold mb-1">Create Stock Transfer</h4>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="{% url 'stock_dashboard' %}">Stock</a></li>
                <li class="breadcrumb-item"><a href="{% url 'stock_transfer_list' %}">Transfers</a></li>
                <li class="breadcrumb-item active">New Transfer</li>
            </ol>
        </nav>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-header bg-primary bg-opacity-10 border-bottom">
        <h5 class="mb-0"><i class="ri-arrow-left-right-line me-2 text-primary"></i>Transfer Stock Between Stores</h5>
    </div>
    <div class="card-body">
        <form method="post" id="transferForm">
            {% csrf_token %}
            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <label class="form-label fw-medium">From Store *</label>
                    <select name="from_store" id="fromStore" class="form-select" required>
                        <option value="">Select source store...</option>
                        {% for key, name in stores %}
                        <option value="{{ key }}">{{ name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end justify-content-center">
                    <div class="text-center">
                        <i class="ri-arrow-right-line fs-2 text-primary"></i>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-medium">To Store *</label>
                    <select name="to_store" id="toStore" class="form-select" required>
                        <option value="">Select destination store...</option>
                        {% for key, name in stores %}
                        <option value="{{ key }}">{{ name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-medium">Notes</label>
                    <textarea name="notes" class="form-control" rows="2" placeholder="Transfer notes..."></textarea>
                </div>
            </div>

            <h6 class="fw-bold mb-3">Products to Transfer</h6>
            <div id="productsContainer">
                <div class="row g-3 mb-3 product-row align-items-end">
                    <div class="col-md-5">
                        <label class="form-label">Product</label>
                        <select name="product_ids[]" class="form-select product-select" required>
                            <option value="">Select product...</option>
                            {% for product in products %}
                            <option value="{{ product.id }}"
                                data-mcdave="{{ product.mcdave_stock }}"
                                data-kisii="{{ product.kisii_stock }}"
                                data-offshore="{{ product.offshore_stock }}">
                                {{ product.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Available</label>
                        <input type="text" class="form-control available-stock" readonly value="-">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantities[]" class="form-control quantity-input" min="1" required placeholder="Qty">
                    </div>
                    <div class="col-md-2">
                        <button type="button" class="btn btn-outline-danger w-100 remove-row" disabled>
                            <i class="ri-delete-bin-line"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button type="button" id="addProduct" class="btn btn-outline-primary mb-4">
                <i class="ri-add-line me-1"></i> Add Another Product
            </button>

            <div class="border-top pt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="ri-send-plane-line me-1"></i> Create Transfer
                </button>
                <a href="{% url 'stock_transfer_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('productsContainer');
    const addBtn = document.getElementById('addProduct');
    const fromStore = document.getElementById('fromStore');

    function updateAvailableStock() {
        const store = fromStore.value;
        document.querySelectorAll('.product-row').forEach(row => {
            const select = row.querySelector('.product-select');
            const stockField = row.querySelector('.available-stock');
            const option = select.options[select.selectedIndex];

            if (option && option.value && store) {
                stockField.value = option.getAttribute('data-' + store) || 0;
            } else {
                stockField.value = '-';
            }
        });
    }

    fromStore.addEventListener('change', updateAvailableStock);

    container.addEventListener('change', function(e) {
        if (e.target.classList.contains('product-select')) {
            updateAvailableStock();
        }
    });

    addBtn.addEventListener('click', function() {
        const rows = container.querySelectorAll('.product-row');
        const newRow = rows[0].cloneNode(true);
        newRow.querySelectorAll('input').forEach(input => input.value = '');
        newRow.querySelectorAll('select').forEach(select => select.value = '');
        newRow.querySelector('.available-stock').value = '-';
        newRow.querySelector('.remove-row').disabled = false;
        container.appendChild(newRow);
        updateRemoveButtons();
    });

    container.addEventListener('click', function(e) {
        if (e.target.closest('.remove-row')) {
            const row = e.target.closest('.product-row');
            if (container.querySelectorAll('.product-row').length > 1) {
                row.remove();
                updateRemoveButtons();
            }
        }
    });

    function updateRemoveButtons() {
        const rows = container.querySelectorAll('.product-row');
        rows.forEach(row => {
            row.querySelector('.remove-row').disabled = rows.length === 1;
        });
    }
});
</script>
{% endblock %}
